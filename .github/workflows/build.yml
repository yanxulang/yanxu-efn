name: Build EF library

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout yanxu-efn
        uses: actions/checkout@v4

      - name: Checkout yanxu runtime
        uses: actions/checkout@v4
        with:
          repository: YanXuLang/yanxu
          path: yanxu

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ make

      - name: Build yanxu C ABI runtime
        working-directory: yanxu
        run: cargo build --release

      - name: Build EF native library
        run: make

      - name: Package artifact
        run: |
          mkdir -p dist
          cp "言序.efn" dist/
          cp yanxu/target/release/libyanxu.so dist/
          cp README.md dist/
          tar -C dist -czf yanxu-efn-linux-x86_64.tar.gz .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: yanxu-efn-linux-x86_64
          path: |
            yanxu-efn-linux-x86_64.tar.gz
            dist/言序.efn
            dist/libyanxu.so
            dist/README.md

  build-windows:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout yanxu-efn
        uses: actions/checkout@v4

      - name: Checkout yanxu runtime
        uses: actions/checkout@v4
        with:
          repository: YanXuLang/yanxu
          path: yanxu

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y g++-mingw-w64-x86-64 make zip
          rustup target add x86_64-pc-windows-gnu

      - name: Build yanxu C ABI runtime
        working-directory: yanxu
        run: cargo build --release --target x86_64-pc-windows-gnu

      - name: Build EF native library
        run: make TARGET=windows CXX=x86_64-w64-mingw32-g++ OUTPUT_FILE=言序.efn

      - name: Package artifact
        run: |
          mkdir -p dist
          cp "言序.efn" dist/
          cp yanxu/target/x86_64-pc-windows-gnu/release/yanxu.dll dist/
          cp README.md dist/
          (cd dist && zip -9 -r ../yanxu-efn-windows-x86_64.zip .)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: yanxu-efn-windows-x86_64
          path: |
            yanxu-efn-windows-x86_64.zip
            dist/言序.efn
            dist/yanxu.dll
            dist/README.md

  publish-release:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs:
      - build-linux
      - build-windows
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/yanxu-efn-linux-x86_64/yanxu-efn-linux-x86_64.tar.gz
            release-assets/yanxu-efn-windows-x86_64/yanxu-efn-windows-x86_64.zip

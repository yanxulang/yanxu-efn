name: Build EF library

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout yanxu-efn
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ make

      - name: Build EF native library
        run: make

      - name: Package artifact
        run: |
          mkdir -p dist
          cp "言序.efn" dist/
          cp README.md dist/
          cp scripts/build-yanxu-runtime.sh dist/
          tar -C dist -czf yanxu-efn-linux-x86_64-bridge-only.tar.gz .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: yanxu-efn-linux-x86_64-bridge-only
          path: |
            yanxu-efn-linux-x86_64-bridge-only.tar.gz
            dist/言序.efn
            dist/README.md
            dist/build-yanxu-runtime.sh

  build-windows:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout yanxu-efn
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y g++-mingw-w64-i686 make zip

      - name: Build EF native library
        run: make TARGET=windows CXX=i686-w64-mingw32-g++ OUTPUT_FILE=言序.efn

      - name: Package artifact
        run: |
          mkdir -p dist
          cp "言序.efn" dist/
          cp README.md dist/
          cp scripts/build-yanxu-runtime.ps1 dist/
          (cd dist && zip -9 -r ../yanxu-efn-windows-x86-bridge-only.zip .)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: yanxu-efn-windows-x86-bridge-only
          path: |
            yanxu-efn-windows-x86-bridge-only.zip
            dist/言序.efn
            dist/README.md
            dist/build-yanxu-runtime.ps1

  verify-yanxu-runtime-windows-x86:
    runs-on: windows-latest
    steps:
      - name: Checkout yanxu runtime
        uses: actions/checkout@v4
        with:
          repository: YanXuLang/yanxu
          path: yanxu

      - name: Install Rust target
        run: rustup target add i686-pc-windows-msvc

      - name: Build 32-bit yanxu runtime
        working-directory: yanxu
        run: cargo build --release --target i686-pc-windows-msvc

      - name: Verify runtime DLL
        shell: pwsh
        run: |
          $dll = "yanxu\target\i686-pc-windows-msvc\release\yanxu.dll"
          if (-not (Test-Path $dll)) { throw "yanxu.dll was not produced" }
          $bytes = [System.IO.File]::ReadAllBytes($dll)
          if ($bytes[0] -ne 0x4d -or $bytes[1] -ne 0x5a) { throw "yanxu.dll is not a PE file" }
          Write-Host "Built 32-bit yanxu runtime: $dll"

  publish-release:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs:
      - build-linux
      - build-windows
      - verify-yanxu-runtime-windows-x86
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/yanxu-efn-linux-x86_64-bridge-only/yanxu-efn-linux-x86_64-bridge-only.tar.gz
            release-assets/yanxu-efn-windows-x86-bridge-only/yanxu-efn-windows-x86-bridge-only.zip

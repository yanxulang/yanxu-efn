name: Build EF library

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout yanxu-efn
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ make

      - name: Build EF native library
        run: make

      - name: Package artifact
        run: |
          mkdir -p dist
          cp "иЁЂеєЏ.efn" dist/
          cp README.md dist/
          cp scripts/build-yanxu-runtime.sh dist/
          tar -C dist -czf yanxu-efn-linux-x86_64-bridge-only.tar.gz .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: yanxu-efn-linux-x86_64-bridge-only
          path: |
            yanxu-efn-linux-x86_64-bridge-only.tar.gz
            dist/иЁЂеєЏ.efn
            dist/README.md
            dist/build-yanxu-runtime.sh

  build-windows:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout yanxu-efn
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y g++-mingw-w64-i686 make zip

      - name: Build EF native library
        run: make TARGET=windows CXX=i686-w64-mingw32-g++ OUTPUT_FILE=иЁЂеєЏ.efn

      - name: Package artifact
        run: |
          mkdir -p dist
          cp "иЁЂеєЏ.efn" dist/
          cp README.md dist/
          cp scripts/build-yanxu-runtime.ps1 dist/
          (cd dist && zip -9 -r ../yanxu-efn-windows-x86-bridge-only.zip .)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: yanxu-efn-windows-x86-bridge-only
          path: |
            yanxu-efn-windows-x86-bridge-only.zip
            dist/иЁЂеєЏ.efn
            dist/README.md
            dist/build-yanxu-runtime.ps1

  publish-release:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs:
      - build-linux
      - build-windows
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/yanxu-efn-linux-x86_64-bridge-only/yanxu-efn-linux-x86_64-bridge-only.tar.gz
            release-assets/yanxu-efn-windows-x86-bridge-only/yanxu-efn-windows-x86-bridge-only.zip
